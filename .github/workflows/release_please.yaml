on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - folder_a
          - folder_b
          - folder_c
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          include-component-in-tag: true
          path: ${{ matrix.path }}